<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Review Form</title>
    <meta name="description"
        content="Product Review Form for WDD131, dynamically loading construction services lists and utilizing localStorage to track submissions.">
    <meta name="author" content="Norlin Vicente">
    <link rel="stylesheet" href="styles/form.css">
    <script src="scripts/form.js" defer></script>
</head>

<body>
    <header>
        <h1>Product Review</h1>
    </header>
    <main>
        <form method="get" action="review.html">
            <fieldset>
                <legend>Product Selection</legend>
                <label for="productName">Product Name <span class="required">*</span></label>
                <select id="productName" name="productName" required>
                    <option value="" disabled selected>Select a Product ...</option>
                </select>
            </fieldset>

            <fieldset>
                <legend>Your Assessment</legend>
                <div class="rating-label">Overall Rating <span class="required">*</span></div>
                <div class="rating-container">
                    <input type="radio" name="rating" id="rating1" value="1" required>
                    <label for="rating1">1 ★</label>

                    <input type="radio" name="rating" id="rating2" value="2" required>
                    <label for="rating2">2 ★</label>

                    <input type="radio" name="rating" id="rating3" value="3" required>
                    <label for="rating3">3 ★</label>

                    <input type="radio" name="rating" id="rating4" value="4" required>
                    <label for="rating4">4 ★</label>

                    <input type="radio" name="rating" id="rating5" value="5" required>
                    <label for="rating5">5 ★</label>
                </div>

                <label for="installationDate">Date of Installation <span class="required">*</span></label>
                <input type="date" id="installationDate" name="installationDate" required>

                <div class="features-label">Features Useful to You (Check all that apply)</div>
                <div class="checkbox-container">
                    <input type="checkbox" name="features" id="feat-durability" value="durability">
                    <label for="feat-durability">Durability</label>

                    <input type="checkbox" name="features" id="feat-ease" value="easeOfUse">
                    <label for="feat-ease">Ease of Use</label>

                    <input type="checkbox" name="features" id="feat-performance" value="performance">
                    <label for="feat-performance">Performance</label>

                    <input type="checkbox" name="features" id="feat-design" value="design">
                    <label for="feat-design">Design</label>
                </div>
            </fieldset>

            <fieldset>
                <legend>Review Details</legend>
                <label for="writtenReview">Written Review</label>
                <textarea id="writtenReview" name="writtenReview" rows="4"
                    placeholder="Share your experience with this service..."></textarea>

                <label for="userName">Your Name</label>
                <input type="text" id="userName" name="userName" placeholder="Optional">
            </fieldset>

            <input type="submit" value="Post Review">
        </form>
    </main>
    <footer>
        <p>&copy; <span id="currentYear"></span> | Norlin Vicente | Richmond, VA</p>
        <p id="lastModified"></p>
    </footer>
</body>

</html>
