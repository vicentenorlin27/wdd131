<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Review Form</title>
    <meta name="description"
        content="Product Review Form for WDD131, dynamically loading construction services lists and utilizing localStorage to track submissions.">
    <link rel="stylesheet" href="styles/form.css">
    <script src="scripts/form.js" defer></script>
</head>

<body>
    <header>
        <h1>Product Review</h1>
    </header>
    <main>
        <form method="get" action="review.html">
            <fieldset>
                <legend>Product Selection</legend>
                <label for="productName">Product Name <span class="required">*</span></label>
                <select id="productName" name="productName" required>
                    <option value="" disabled selected>Choose a Product...</option>
                </select>
            </fieldset>

            <fieldset>
                <legend>Your Assessment</legend>
                <div class="rating-label">Overall Rating <span class="required">*</span></div>
                <div class="rating-container">
                    <label><input type="radio" name="rating" value="1" required> 1 ★</label>
                    <label><input type="radio" name="rating" value="2"> 2 ★</label>
                    <label><input type="radio" name="rating" value="3"> 3 ★</label>
                    <label><input type="radio" name="rating" value="4"> 4 ★</label>
                    <label><input type="radio" name="rating" value="5"> 5 ★</label>
                </div>

                <label for="installationDate">Date of Installation <span class="required">*</span></label>
                <input type="date" id="installationDate" name="installationDate" required>

                <div class="features-label">Features Useful to You (Check all that apply)</div>
                <div class="checkbox-container">
                    <label><input type="checkbox" name="features" value="durability"> Durability</label>
                    <label><input type="checkbox" name="features" value="easeOfUse"> Ease of Use</label>
                    <label><input type="checkbox" name="features" value="performance"> Performance</label>
                    <label><input type="checkbox" name="features" value="design"> Design</label>
                </div>
            </fieldset>

            <fieldset>
                <legend>Review Details</legend>
                <label for="writtenReview">Written Review</label>
                <textarea id="writtenReview" name="writtenReview" rows="4"
                    placeholder="Share your experience with this service..."></textarea>

                <label for="userName">Your Name</label>
                <input type="text" id="userName" name="userName" placeholder="Optional">
            </fieldset>

            <input type="submit" value="Post Review">
        </form>
    </main>
    <footer>
        <p>&copy; <span id="currentYear"></span> | Norlin Vicente | Richmond, VA</p>
        <p id="lastModified"></p>
    </footer>
</body>

</html>
