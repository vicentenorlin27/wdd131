<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Review Confirmation</title>
    <link rel="stylesheet" href="styles/form.css">
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            let reviewCount = parseInt(localStorage.getItem("reviewCount")) || 0;
            reviewCount++;
            localStorage.setItem("reviewCount", reviewCount);

            const displaySpan = document.getElementById("countDisplay");
            if (displaySpan) {
                displaySpan.textContent = reviewCount;
            }

            document.getElementById("currentYear").textContent = new Date().getFullYear();
            document.getElementById("lastModified").textContent = `Last Modification Date: ${document.lastModified}`;
        });
    </script>
</head>

<body>
    <header>
        <h1>Submission Received</h1>
    </header>
    <main>
        <div class="counter-display">
            <h2>Thank You for Your Feedback!</h2>
            <p>Your service evaluation metrics have been logged successfully.</p>
            <p>Total reviews submitted across this browser session:</p>
            <div id="countDisplay" class="counter-number">0</div>
            <p><a href="form.html" style="color: var(--accent-color); font-weight: bold; text-decoration: none;">Submit
                    Another Review</a></p>
        </div>
    </main>
    <footer>
        <p>&copy; <span id="currentYear"></span> | Norlin Vicente | Richmond, VA</p>
        <p id="lastModified"></p>
    </footer>
</body>

</html>
