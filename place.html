<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guatemala Country Page</title>

    <link rel="stylesheet" href="styles/place.css">
    <link rel="stylesheet" href="styles/place-large.css">

    <script src="scripts/place.js" defer></script>
</head>

<body>

    <header>
        <h1>Guatemala</h1>
    </header>

    <main>

        <section class="hero">
            <picture>
                <source srcset="images/guatemala-large.webp" media="(min-width: 768px)">
                <img src="images/guatemala-small.webp" alt="Guatemala landscape">
            </picture>
        </section>

        <section class="data">
            <h2>Country Data</h2>

            <img src="images/flag-guatemala.webp" alt="Guatemala Flag">

            <ul>
                <li><strong>Capital:</strong> Guatemala City</li>
                <li><strong>Population:</strong> 17.9M</li>
                <li><strong>Area:</strong> 108,889 km²</li>
                <li><strong>Languages:</strong> Spanish, Mayan</li>
                <li><strong>Currency:</strong> Quetzal</li>
                <li><strong>Time Zone:</strong> UTC -6</li>
            </ul>
        </section>

        <section class="weather">
            <h2>Weather</h2>

            <img src="images/weather.svg" alt="Weather icon" class="weather-icon">

            <p>Temperature: <span id="temp">24</span> °C</p>
            <p>Wind Speed: <span id="wind">10</span> km/h</p>

            <p>Wind Chill: <span id="windchill"></span></p>
        </section>

        <section class="highlights">
            <h2>Highlights</h2>

            <figure>
                <img src="images/volcan-fuego.webp" alt="Volcan Fuego">
                <figcaption>Volcán de Fuego</figcaption>
            </figure>
            <figure>
                <img src="images/lake-atitlan.webp" alt="Lake Atitlán">
                <figcaption>Lake Atitlán</figcaption>
            </figure>
            <figure>
                <img src="images/antigua.webp" alt="Antigua Guatemala">
                <figcaption>Antigua Guatemala</figcaption>
            </figure>
        </section>

    </main>

    <footer>
        <p>&copy; <span id="year"></span> | Guatemala Page | Norlin Vicente</p>
        <p>Last Modified: <span id="lastModified"></span></p>
    </footer>
